<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaire - Statistiques</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        h1 { color: #f0c040; font-size: 1.6em; }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .chart-card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #252d4a;
        }
        .pie-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 320px;
        }
        .footer {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }
        .footer a {
            background: #0f3460;
            color: #eee;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .footer a:hover { background: #1a5276; }
        .summary {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1 1 200px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-box .label { font-size: 0.8em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
        .stat-box .value { font-size: 1.6em; font-weight: bold; color: #f0c040; }
        
        /* Tab Styles */
        .tab-btn {
            background: #1a1a2e;
            color: #888;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            border-color: #f0c040;
            color: #f0c040;
        }
        .tab-btn.active {
            background: #f0c040;
            color: #1a1a2e;
            border-color: #f0c040;
            box-shadow: 0 4px 15px rgba(240, 192, 64, 0.3);
        }
        #statDate {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #16213e;
            color: white;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .nav-btn {
            background: #16213e;
            color: #f0c040;
            border: 1px solid #333;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background: #f0c040;
            color: #1a1a2e;
            border-color: #f0c040;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Historique Énergétique</h1>
            <p style="color:#888; font-size: 0.9em;">Consommation et Redirection Solaire</p>
        </div>

        <div class="tab-container" style="display: flex; gap: 8px; margin-bottom: 20px; justify-content: center;">
            <button class="tab-btn active" onclick="setView('day')" id="btnDay">Jour</button>
            <button class="tab-btn" onclick="setView('week')" id="btnWeek">Semaine</button>
            <button class="tab-btn" onclick="setView('month')" id="btnMonth">Mois</button>
            <button class="tab-btn" onclick="setView('year')" id="btnYear">Année</button>
        </div>

        <div id="dateSelector" style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 24px;">
            <button class="nav-btn" onclick="changeDate(-1)">&#10094;</button>
            <input type="date" id="statDate" onchange="refreshView()">
            <button class="nav-btn" onclick="changeDate(1)">&#10095;</button>
        </div>

        <div class="summary" id="statsSummary">
            <div class="stat-box">
                <div class="label">Total Réseau</div>
                <div class="value" id="totalImport">— kWh</div>
            </div>
            <div class="stat-box">
                <div class="label">Total Injecté</div>
                <div class="value" id="totalExport">— kWh</div>
            </div>
            <div class="stat-box">
                <div class="label">Total Redirigé</div>
                <div class="value" id="totalRedirect">— kWh</div>
            </div>
            <div class="stat-box">
                <div class="label">Autoconsommation</div>
                <div class="value" id="autoConsRate">— %</div>
            </div>
            <div class="stat-box">
                <div class="label">Temps de chauffe</div>
                <div class="value" id="activeTime">—</div>
            </div>
        </div>

        <div class="chart-card">
            <canvas id="barChart" style="height: 350px;"></canvas>
        </div>

        <div class="chart-card">
            <h3 style="text-align:center; margin-bottom: 15px; color: #aaa; font-size: 0.9em;">RÉPARTITION GLOBALE</h3>
            <div class="pie-container">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="footer">
            <a href="/">Retour au Dashboard</a>
        </div>
    </div>

    <script>
        let currentView = 'day';
        let statsData = {};
        let barChart = null;
        let pieChart = null;

        // Set default date to today
        document.getElementById('statDate').valueAsDate = new Date();

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            
            // Adjust date picker type based on view
            const dateInput = document.getElementById('statDate');
            const navBtns = document.querySelectorAll('.nav-btn');
            if (view === 'year') {
                dateInput.style.display = 'none'; // No date needed for year view
                navBtns.forEach(b => b.style.display = 'none');
            } else {
                dateInput.style.display = 'inline-block';
                navBtns.forEach(b => b.style.display = 'flex');
            }
            
            refreshView();
        }

        function changeDate(delta) {
            const dateInput = document.getElementById('statDate');
            const d = new Date(dateInput.value);
            if (currentView === 'day') {
                d.setDate(d.getDate() + delta);
            } else if (currentView === 'week') {
                d.setDate(d.getDate() + (delta * 7));
            } else if (currentView === 'month') {
                d.setMonth(d.getMonth() + delta);
            }
            dateInput.valueAsDate = d;
            refreshView();
        }

        async function refreshView() {
            if (Object.keys(statsData).length === 0) await loadRawData();
            renderCharts();
        }

        async function loadRawData() {
            try {
                const response = await fetch('/get_stats');
                statsData = await response.json();
            } catch (e) {
                console.error("Error loading stats:", e);
            }
        }

        function renderCharts() {
            const selectedDate = document.getElementById('statDate').value; // YYYY-MM-DD
            const [selYear, selMonth, selDay] = selectedDate.split('-');
            
            let labels = [];
            let importData = [];
            let redirectData = [];
            let exportData = [];
            
            if (currentView === 'day') {
                // Detailed Hourly view for the single day
                if (statsData[selectedDate]) {
                    const day = statsData[selectedDate];
                    if (day.h_import && day.h_redirect) {
                        labels = Array.from({length: 24}, (_, i) => `${i}h`);
                        importData = day.h_import.map(v => v / 1000);
                        redirectData = day.h_redirect.map(v => v / 1000);
                        exportData = day.h_export ? day.h_export.map(v => v / 1000) : Array(24).fill(0);
                    } else {
                        // Fallback to single bar if no hourly data
                        labels = [selectedDate.split('-').reverse().join('/')];
                        importData = [day.import / 1000];
                        redirectData = [day.redirect / 1000];
                        exportData = [day.export ? day.export / 1000 : 0];
                    }
                }
            } else if (currentView === 'week') {
                // Show 7 days ending at selectedDate
                const end = new Date(selectedDate);
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(end);
                    d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric' }));
                    if (statsData[ds]) {
                        importData.push(statsData[ds].import / 1000);
                        redirectData.push(statsData[ds].redirect / 1000);
                        exportData.push((statsData[ds].export || 0) / 1000);
                    } else {
                        importData.push(0);
                        redirectData.push(0);
                        exportData.push(0);
                    }
                }
            } else if (currentView === 'month') {
                // All days in the selected month
                const monthPrefix = `${selYear}-${selMonth}`;
                const days = Object.keys(statsData).filter(d => d.startsWith(monthPrefix)).sort();
                labels = days.map(d => d.split('-')[2]); // Just the day number
                importData = days.map(d => statsData[d].import / 1000);
                redirectData = days.map(d => statsData[d].redirect / 1000);
                exportData = days.map(d => (statsData[d].export || 0) / 1000);
            } else if (currentView === 'year') {
                // Aggregated by month for the last 12 months
                const months = {};
                Object.keys(statsData).forEach(d => {
                    const mKey = d.substring(0, 7); // YYYY-MM
                    if (!months[mKey]) months[mKey] = { i: 0, r: 0, e: 0 };
                    months[mKey].i += statsData[d].import / 1000;
                    months[mKey].r += statsData[d].redirect / 1000;
                    months[mKey].e += (statsData[d].export || 0) / 1000;
                });
                labels = Object.keys(months).sort();
                importData = labels.map(m => months[m].i);
                redirectData = labels.map(m => months[m].r);
                exportData = labels.map(m => months[m].e);
                // Human labels: MM/YY
                labels = labels.map(m => m.split('-').reverse().join('/'));
            }

            // Totals
            let tImp = importData.reduce((a, b) => a + b, 0);
            let tRed = redirectData.reduce((a, b) => a + b, 0);
            let tExp = exportData.reduce((a, b) => a + b, 0);
            
            document.getElementById('totalImport').textContent = tImp.toFixed(2) + ' kWh';
            document.getElementById('totalExport').textContent = tExp.toFixed(2) + ' kWh';
            document.getElementById('totalRedirect').textContent = tRed.toFixed(2) + ' kWh';
            const rate = (tRed / (tExp + tRed) * 100) || 0;
            document.getElementById('autoConsRate').textContent = rate.toFixed(1) + ' %';

            // Active Time
            if (currentView === 'day' && statsData[selectedDate]) {
                const secs = statsData[selectedDate].active_time || 0;
                const hrs = Math.floor(secs / 3600);
                const mins = Math.floor((secs % 3600) / 60);
                document.getElementById('activeTime').textContent = `${hrs}h ${mins}m`;
            } else {
                document.getElementById('activeTime').textContent = "—";
            }

            // Update Bar Chart
            if (barChart) barChart.destroy();
            const ctxBar = document.getElementById('barChart').getContext('2d');
            
            // Create gradients
            const gradImport = ctxBar.createLinearGradient(0, 0, 0, 400);
            gradImport.addColorStop(0, '#e74c3c');
            gradImport.addColorStop(1, 'rgba(231, 76, 60, 0.3)');
            
            const gradRedirect = ctxBar.createLinearGradient(0, 0, 0, 400);
            gradRedirect.addColorStop(0, '#2ecc71');
            gradRedirect.addColorStop(1, 'rgba(46, 204, 113, 0.3)');

            const gradExport = ctxBar.createLinearGradient(0, 0, 0, 400);
            gradExport.addColorStop(0, '#f1c40f');
            gradExport.addColorStop(1, 'rgba(241, 196, 15, 0.3)');

            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: 'Réseau (Import) (kWh)', 
                            data: importData, 
                            backgroundColor: gradImport,
                            borderColor: '#e74c3c',
                            borderWidth: 1,
                            borderRadius: 6
                        },
                        { 
                            label: 'Solaire utilisé (kWh)', 
                            data: redirectData, 
                            backgroundColor: gradRedirect,
                            borderColor: '#2ecc71',
                            borderWidth: 1,
                            borderRadius: 6
                        },
                        { 
                            label: 'Injecté (Export) (kWh)', 
                            data: exportData, 
                            backgroundColor: gradExport,
                            borderColor: '#f1c40f',
                            borderWidth: 1,
                            borderRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }, 
                            ticks: { color: '#999' } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#999' } 
                        }
                    },
                    plugins: { 
                        legend: { labels: { color: '#eee', font: { weight: 'bold' } } }
                    }
                },
                plugins: [{
                    id: 'barShadow',
                    beforeDraw: (chart) => {
                        const {ctx} = chart;
                        ctx.save();
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 5;
                        ctx.shadowOffsetY = 5;
                    },
                    afterDraw: (chart) => {
                        chart.ctx.restore();
                    }
                }]
            });

            // Update Pie Chart (Gauge Style)
            if (pieChart) pieChart.destroy();
            const ctxPie = document.getElementById('pieChart').getContext('2d');

            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Réseau', 'Solaire utilisé'],
                    datasets: [{
                        data: [tImp, tRed],
                        backgroundColor: ['#e74c3c', '#2ecc71'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    circumference: 180,
                    rotation: -90,
                    cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#eee', padding: 10 } },
                        tooltip: {
                            callbacks: {
                                label: (item) => ` ${item.label}: ${item.raw.toFixed(2)} kWh`
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'centerText',
                    afterDraw: (chart) => {
                        const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
                        ctx.save();
                        ctx.font = 'bold 2em Arial';
                        ctx.fillStyle = '#2ecc71';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const text = rate.toFixed(1) + '%';
                        ctx.fillText(text, width / 2 + left, bottom - 10);
                        ctx.font = '0.8em Arial';
                        ctx.fillStyle = '#aaa';
                        ctx.fillText('SOLAIRE', width / 2 + left, bottom - 45);
                        ctx.restore();
                    }
                }]
            });

        }

        refreshView();
    </script>
</body>
</html>
